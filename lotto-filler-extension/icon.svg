<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b" /> <!-- deep indigo -->
      <stop offset="100%" stop-color="#311042" /> <!-- dark purple -->
    </linearGradient>
    
    <!-- Fire Flame Gradient -->
    <linearGradient id="fireGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#ea580c" /> <!-- orange -->
      <stop offset="60%" stop-color="#f43f5e" /> <!-- rose -->
      <stop offset="100%" stop-color="#eab308" /> <!-- yellow -->
    </linearGradient>
    
    <!-- Ring / Glow Gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" /> <!-- purple -->
      <stop offset="100%" stop-color="#ec4899" /> <!-- pink -->
    </linearGradient>
    
    <!-- Ball Gradient -->
    <radialGradient id="ballGrad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="40%" stop-color="#e2e8f0" />
      <stop offset="100%" stop-color="#94a3b8" />
    </radialGradient>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Base Rounded Container -->
  <rect width="128" height="128" rx="32" fill="url(#bgGrad)" stroke="#312e81" stroke-width="2" />

  <!-- Inner Glowing Ring -->
  <circle cx="64" cy="64" r="54" fill="none" stroke="url(#ringGrad)" stroke-width="4" filter="url(#glow)" opacity="0.8" />

  <!-- Flame Symbol (LottoFire) -->
  <path d="M 64 25 
           C 78 45, 84 55, 84 75 
           C 84 92, 70 102, 64 102 
           C 58 102, 44 92, 44 75 
           C 44 55, 50 45, 64 25 Z" 
        fill="url(#fireGrad)" filter="url(#glow)" />

  <!-- Inner overlay flame for depth -->
  <path d="M 64 45 
           C 72 60, 75 66, 75 78 
           C 75 88, 68 94, 64 94 
           C 60 94, 53 88, 53 78 
           C 53 66, 56 60, 64 45 Z" 
        fill="#fef08a" opacity="0.9" />

  <!-- Floating Lottery Ball with "F" -->
  <circle cx="90" cy="90" r="18" fill="url(#ballGrad)" stroke="#1e293b" stroke-width="2" filter="url(#glow)" />
  <text x="90" y="96" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="900" fill="#0f172a" text-anchor="middle">F</text>
</svg>
